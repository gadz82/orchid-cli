# orchid-cli (Typer CLI) — CI + Semantic Release

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────

  ruff:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check orchid_cli/
      - run: ruff format --check orchid_cli/

  commit-lint:
    name: Commit message check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install gitlint
      - run: gitlint --commits "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  # ── Test ────────────────────────────────────────────────────

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]" pytest-cov
      - name: Run tests
        run: |
          pytest tests/ \
            --cov=orchid_cli \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=report.xml \
            -x
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml
          if-no-files-found: ignore
      - name: Coverage summary
        if: hashFiles('coverage.xml') != ''
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/coverage.xml"
          format: markdown
          output: both
          badge: true
          fail_below_min: false
          thresholds: "50 75"
      - name: Add coverage PR comment
        if: github.event_name == 'pull_request' && hashFiles('code-coverage-results.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: code-coverage-results.md

  # ── Build ───────────────────────────────────────────────────

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [ruff, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Release (semantic-release on main push) ─────────────────

  release:
    name: Semantic release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [ruff, test, build]
    permissions:
      contents: write
      id-token: write  # required for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install python-semantic-release build
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version & tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(semantic-release version --push --tag --commit 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "no release will be made"; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build distribution
        if: steps.version.outputs.released == 'true'
        run: python -m build
      - name: Publish GitHub Release
        if: steps.version.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish
      # 4. Publish to PyPI via trusted publishing (OIDC)
      - name: Publish to PyPI
        if: steps.version.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
